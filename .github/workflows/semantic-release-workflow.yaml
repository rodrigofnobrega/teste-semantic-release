name: Releasing with Semantic Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necessário para criar tags e releases
      issues: write
      pull-requests: write
      
    steps:
      - id: checkout-step
        name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Importante para o semantic-release analisar todo o histórico

      # Node é necessário APENAS para rodar a ferramenta semantic-release
      - id: setup-node-step
        name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Setup do ambiente C#
      - id: setup-dotnet-step
        name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x" # Ajuste para a versão do seu projeto (6, 7, 8, 9)

      # Instala as ferramentas do Semantic Release globalmente no runner
      # Incluindo o plugin 'exec' para rodar comandos dotnet e 'git' para commitar mudanças
      - id: install-tools-step
        name: Install Semantic Release & Plugins
        run: npm install -g semantic-release @semantic-release/git @semantic-release/exec @semantic-release/changelog

      - id: verify-step
        name: Verify dependencies
        run: dotnet restore

      # O passo de Release.
      # Nota: Removemos o 'npm run build' anterior.
      # O build real deve ser feito DENTRO do semantic-release (via plugin exec)
      # para que ele receba o número da versão correto.
      - id: semantic-release-step
        name: Release with Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx semantic-release
